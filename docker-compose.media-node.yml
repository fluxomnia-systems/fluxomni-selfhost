services:
  media-node:
    image: ${FLUXOMNI_MEDIA_NODE_IMAGE:-ghcr.io/fluxomnia-systems/fluxomni-media-node}:${FLUXOMNI_VERSION:-latest}
    container_name: ${FLUXOMNI_MEDIA_NODE_CONTAINER_NAME:-fluxomni-media-node}
    restart: unless-stopped
    env_file: .env
    environment:
      FLUXOMNI_APP_ROOT: /app/fluxomni-data
      FLUXOMNI_CONTROL_PLANE_INTERNAL_AUTH_TOKEN: ${FLUXOMNI_CONTROL_PLANE_INTERNAL_AUTH_TOKEN:?Set FLUXOMNI_CONTROL_PLANE_INTERNAL_AUTH_TOKEN in .env}
      FLUXOMNI_CONTROL_PLANE_RPC_ENDPOINT: ${FLUXOMNI_CONTROL_PLANE_RPC_ENDPOINT:?Set FLUXOMNI_CONTROL_PLANE_RPC_ENDPOINT in .env}
      FLUXOMNI_MEDIA_NODE_ENDPOINT: ${FLUXOMNI_MEDIA_NODE_ENDPOINT:?Set FLUXOMNI_MEDIA_NODE_ENDPOINT in .env}
      FLUXOMNI_MEDIA_NODE_GRPC_BIND: 0.0.0.0:50051
      FLUXOMNI_MEDIA_NODE_HEARTBEAT_INTERVAL_SECS: ${FLUXOMNI_MEDIA_NODE_HEARTBEAT_INTERVAL_SECS:-5}
      FLUXOMNI_MEDIA_NODE_ID: ${FLUXOMNI_MEDIA_NODE_ID:?Set FLUXOMNI_MEDIA_NODE_ID in .env}
      FLUXOMNI_MEDIA_NODE_LABELS: ${FLUXOMNI_MEDIA_NODE_LABELS:-selfhost}
      FLUXOMNI_MEDIA_NODE_NAME: ${FLUXOMNI_MEDIA_NODE_NAME:?Set FLUXOMNI_MEDIA_NODE_NAME in .env}
      FLUXOMNI_MEDIA_NODE_PUBLIC_HOST: ${FLUXOMNI_MEDIA_NODE_PUBLIC_HOST:?Set FLUXOMNI_MEDIA_NODE_PUBLIC_HOST in .env}
      FLUXOMNI_MEDIA_NODE_SRS_CALLBACK_BIND: 0.0.0.0:8081
      FLUXOMNI_MEDIA_NODE_ZONE: ${FLUXOMNI_MEDIA_NODE_ZONE:-local}
      FLUXOMNI_SERVICE_NAME: fluxomni-media-node
      FLUXOMNI_SRS_HTTP_DIR: /app/fluxomni-data/srs-http
    ports:
      - "${FLUXOMNI_MEDIA_NODE_RTMP_PORT:-1935}:1935"
      - "${FLUXOMNI_MEDIA_NODE_HLS_PORT:-8000}:8000"
      - "${FLUXOMNI_MEDIA_NODE_HLS_PORT:-8000}:8000/udp"
      - "127.0.0.1:${FLUXOMNI_MEDIA_NODE_SRS_CALLBACK_PORT:-8081}:8081"
      - "${FLUXOMNI_MEDIA_NODE_SRT_PORT:-10080}:10080/udp"
      - "${FLUXOMNI_MEDIA_NODE_GRPC_PORT:-50051}:50051"
    volumes:
      - ${FLUXOMNI_MEDIA_NODE_DATA_DIR:-./data}:/app/fluxomni-data
    labels:
      - com.centurylinklabs.watchtower.enable=true

  watchtower:
    image: containrrr/watchtower
    container_name: ${FLUXOMNI_WATCHTOWER_CONTAINER_NAME:-watchtower}
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      WATCHTOWER_CLEANUP: "true"
      WATCHTOWER_POLL_INTERVAL: "86400"
      WATCHTOWER_LABEL_ENABLE: "true"
    profiles: ["auto-update"]
